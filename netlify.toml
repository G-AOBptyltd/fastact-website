[build]
  publish = "."

# --- Content & Product landing page routes ---
# /content/some-slug → content.html (JS reads slug from URL)
[[redirects]]
  from = "/content/*"
  to = "/pages/content.html"
  status = 200

# /product/some-slug → product.html (JS reads slug from URL)
[[redirects]]
  from = "/product/*"
  to = "/pages/product.html"
  status = 200

# --- Legacy /api/cms proxy → Central API ---
# Keeps backward compat if anything still calls /api/cms locally
[[redirects]]
  from = "/api/cms"
  to = "https://api.agilityops.com.au/api/cms"
  status = 200
  force = true

[[redirects]]
  from = "/api/cms/*"
  to = "https://api.agilityops.com.au/api/cms/:splat"
  status = 200
  force = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.agilityops.com.au"

# --- Tools & Games hub route ---
[[redirects]]
  from = "/tools-games"
  to = "/pages/tools-games.html"
  status = 200

# --- Relaxed CSP for interactive games (need CDN libs + map tiles) ---
[[headers]]
  for = "/games/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.agilityops.com.au https://*.tile.opentopomap.org"

# --- Relaxed CSP for interactive tools (Chart.js etc.) ---
[[headers]]
  for = "/tools/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.agilityops.com.au"
