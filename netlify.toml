[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /api/cms to the serverless function for cleaner URLs
[[redirects]]
  from = "/api/cms"
  to = "/.netlify/functions/notion-cms"
  status = 200

[[redirects]]
  from = "/api/cms/*"
  to = "/.netlify/functions/notion-cms"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
